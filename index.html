<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Pastry Calculator V2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700&family=Varela+Round&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              cream: '#FDFBF7',
              'cream-dark': '#F5F0E6',
              rose: {
                50: '#FFF0F5',
                100: '#FFE4E9',
                200: '#FCC2D7', // Soft highlight
                300: '#F0A0A8',
                400: '#C08081', // Dusty Rose (Primary Action)
                500: '#A66061',
              },
              coffee: {
                800: '#4A4040', // Dark Warm Grey
                900: '#382E2E',
              },
            },
            fontFamily: {
              sans: ['Rubik', 'sans-serif'],
              heading: ['Varela Round', 'sans-serif'],
            },
            boxShadow: {
              'soft': '0 10px 40px -10px rgba(192, 128, 129, 0.15)',
              'glass': '0 8px 32px 0 rgba(31, 38, 135, 0.07)',
            }
          }
        }
      }
    </script>
    <style>
      body {
        background: linear-gradient(135deg, #FFF0F5 0%, #FDFBF7 100%);
        color: #4A4040;
        -webkit-tap-highlight-color: transparent;
        min-height: 100vh;
      }
      /* Hide scrollbar for clean UI */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      .glass-panel {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.5);
      }
      input, select, textarea {
        font-size: 16px !important; /* Prevent iOS zoom */
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "firebase/app": "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js",
    "firebase/firestore": "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js",
    "firebase/analytics": "https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics.js",
    "firebase/": "https://esm.sh/firebase@^12.8.0/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
