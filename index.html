<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Pastry Calculator V2</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700&family=Varela+Round&display=swap"
    rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            /* ─── Brand Palette ─── */
            cream: 'var(--color-cream)',
            'cream-dark': 'var(--color-cream-dark)',
            rose: {
              50: 'var(--color-rose-50)',
              100: 'var(--color-rose-100)',
              200: 'var(--color-rose-200)',
              300: 'var(--color-rose-300)',
              400: 'var(--color-rose-400)',
              500: 'var(--color-rose-500)',
              600: 'var(--color-rose-600)',
            },
            coffee: {
              800: 'var(--color-coffee-800)',
              900: 'var(--color-coffee-900)',
            },

            /* ─── Semantic Colors ─── */
            primary: {
              DEFAULT: 'var(--color-primary)',
              hover: 'var(--color-primary-hover)',
              active: 'var(--color-primary-active)',
              disabled: 'var(--color-primary-disabled)',
              ghost: 'var(--color-primary-ghost)',
            },
            accent: {
              ghost: 'var(--bg-accent-ghost)',
              surface: 'var(--bg-accent-surface)',
              soft: 'var(--text-accent-soft)',
              muted: 'var(--text-accent-muted)',
            },
            chip: {
              active: 'var(--bg-chip-active)',
              'active-text': 'var(--text-chip-active)',
            },
            success: {
              bg: 'var(--color-success-bg)',
              text: 'var(--color-success-text)',
              border: 'var(--color-success-border)',
            },
            warning: {
              bg: 'var(--color-warning-bg)',
              text: 'var(--color-warning-text)',
              border: 'var(--color-warning-border)',
            },
            danger: {
              bg: 'var(--color-danger-bg)',
              text: 'var(--color-danger-text)',
              border: 'var(--color-danger-border)',
            },
            info: {
              bg: 'var(--color-info-bg)',
              text: 'var(--color-info-text)',
              border: 'var(--color-info-border)',
            },
            neutral: {
              bg: 'var(--color-neutral-bg)',
              text: 'var(--color-neutral-text)',
              border: 'var(--color-neutral-border)',
            },
          },
          fontFamily: {
            sans: ['Rubik', 'sans-serif'],
            heading: ['Varela Round', 'sans-serif'],
          },
          boxShadow: {
            'soft': 'var(--shadow-soft)',
            'glass': 'var(--shadow-glass)',
            'card': 'var(--shadow-card)',
            'primary-glow': 'var(--shadow-primary-glow)',
          },
          borderRadius: {
            'sm-token': 'var(--radius-sm)',
            'md-token': 'var(--radius-md)',
            'lg-token': 'var(--radius-lg)',
            'xl-token': 'var(--radius-xl)',
            '2xl-token': 'var(--radius-2xl)',
          },
          borderColor: {
            subtle: 'var(--border-subtle)',
            light: 'var(--border-light)',
            DEFAULT: 'var(--border-default)',
            focus: 'var(--border-focus)',
          },
          transitionDuration: {
            'fast': '150ms',
            'base': '200ms',
            'slow': '300ms',
          },
        }
      }
    }
  </script>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "firebase/app": "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js",
    "firebase/firestore": "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js",
    "firebase/analytics": "https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics.js",
    "firebase/": "https://esm.sh/firebase@^12.8.0/"
  }
}
</script>
  <link rel="stylesheet" href="/index.css">
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
